name: selfcare
description: "SelfCare — your daily companion for tasks, study, mood, and journaling."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.2
  flutter_riverpod: ^2.5.1
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4
  url_launcher: ^6.3.1
  intl: ^0.20.2
  uuid: ^4.5.1
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  google_mobile_ads: ^5.2.0
  flutter_svg: ^2.0.10+1
  fl_chart: ^0.69.0
  percent_indicator: ^4.2.3
  permission_handler: ^11.3.1
  package_info_plus: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 23
  adaptive_icon_background: "#FFD1E2"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"

flutter_native_splash:
  color: "#FFD1E2"
  image: assets/icon/splash.png
  android_12:
    color: "#FFD1E2"
    image: assets/icon/splash.png
  android: true
  ios: false

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
